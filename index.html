<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#171a22">
<title>yoonzky</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='3' width='26' height='26' rx='6' fill='%231e222c' stroke='%237aa2f7' stroke-width='2'/%3E%3Ctext x='16' y='22' font-size='15' text-anchor='middle' fill='%237aa2f7' font-family='sans-serif'%3Ey%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#171a22; --panel:#1e222c; --panel2:#262b37; --line:#303645; --line-strong:#dde1ea;
  --text:#dde1ea; --muted:#8a91a3; --accent:#7aa2f7; --accent-text:#171a22; --accent-soft:rgba(122,162,247,.16);
  --dot:#232733;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0; background:var(--bg); color:var(--text);
  background-image:radial-gradient(var(--dot) 1px, transparent 1px); background-size:22px 22px;
  font-family:Inter,-apple-system,'Segoe UI',Roboto,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px}
main{width:100%; max-width:400px; text-align:center}
h1{font-family:Fraunces,serif; font-size:40px; font-weight:700; letter-spacing:.02em; margin:0}
.tagline{margin:6px 0 30px; color:var(--muted); font-size:14px}
.links{display:flex; flex-direction:column; gap:12px}
.link{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line);
  border-radius:14px; padding:15px 18px; text-decoration:none; color:var(--text); cursor:pointer;
  font:inherit; font-size:15px; font-weight:600; text-align:left; width:100%;
  transition:border-color .15s, transform .1s}
.link:hover{border-color:var(--accent)}
.link:active{transform:scale(.98)}
.link svg{flex:none; width:22px; height:22px; stroke:var(--accent); fill:none; stroke-width:1.7;
  stroke-linecap:round; stroke-linejoin:round}
.link span{flex:1}
.link small{color:var(--muted); font-weight:500; font-size:12px}
footer{margin-top:34px; font-size:12px; color:var(--muted)}
footer a{color:var(--muted)}
footer a:hover{color:var(--text)}
#toast{position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(16px);
  background:var(--panel2); border:1px solid var(--line); color:var(--text); opacity:0;
  padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600; pointer-events:none;
  transition:opacity .25s, transform .25s}
#toast.show{opacity:1; transform:translateX(-50%)}
</style>
</head>
<body>
<main>
  <h1>yoonzky</h1>
  <p class="tagline">my links</p>
  <div class="links">
    <a class="link" href="https://t.me/yoonzky" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M21.5 4.5 2.9 11.7c-.8.3-.8 1.4 0 1.7l4.6 1.5 1.7 5.2c.2.7 1.1.9 1.6.3l2.4-2.6 4.7 3.5c.6.4 1.5.1 1.6-.6L22.9 5.6c.2-.8-.6-1.4-1.4-1.1Z"/><path d="m7.5 14.9 9.8-8.1"/></svg>
      <span>Telegram</span><small>@yoonzky</small>
    </a>
    <a class="link" href="https://t.me/+OKa4pUcxoysxYzc6" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M21.5 4.5 2.9 11.7c-.8.3-.8 1.4 0 1.7l4.6 1.5 1.7 5.2c.2.7 1.1.9 1.6.3l2.4-2.6 4.7 3.5c.6.4 1.5.1 1.6-.6L22.9 5.6c.2-.8-.6-1.4-1.4-1.1Z"/><path d="m7.5 14.9 9.8-8.1"/></svg>
      <span>Telegram channel</span><small>t.me</small>
    </a>
    <a class="link" href="https://yoonzky.github.io/sudoku/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      <span>Sudoku</span><small>my game</small>
    </a>
    <a class="link" href="https://open.spotify.com/user/wwiwbonvna6hd55g4x2gmaz5y" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M7.5 9.8c3.2-.9 6.6-.5 9.2 1M8 12.7c2.6-.7 5.3-.4 7.4.8M8.6 15.4c2-.5 4-.2 5.6.7"/></svg>
      <span>Spotify</span><small>playlists</small>
    </a>
    <button class="link" id="discord" type="button">
      <svg viewBox="0 0 24 24"><path d="M8.5 17c-2.5 0-4-1.5-4.5-3 0-4.5 1.5-7.5 2.5-8.5C7.5 4.5 9 4 10 4l.5 1.5h3L14 4c1 0 2.5.5 3.5 1.5 1 1 2.5 4 2.5 8.5-.5 1.5-2 3-4.5 3l-1-1.5c-1.5.5-3.5.5-5 0L8.5 17Z"/><circle cx="9.5" cy="11.5" r=".8"/><circle cx="14.5" cy="11.5" r=".8"/></svg>
      <span>Discord</span><small>yoonzky · click to copy</small>
    </button>
  </div>
  <footer>© 2026 <a href="https://github.com/yoonzky" target="_blank" rel="noopener">yoonzky</a></footer>
</main>
<div id="toast">Copied</div>
<script>
'use strict';
const btn=document.getElementById('discord'), toast=document.getElementById('toast');
let timer=null;
btn.addEventListener('click',async()=>{
  try{ await navigator.clipboard.writeText('yoonzky'); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value='yoonzky';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  toast.classList.add('show');
  clearTimeout(timer); timer=setTimeout(()=>toast.classList.remove('show'),2000);
});
</script>
</body>
</html>
